<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ficha D&D</title>
    <link rel="stylesheet" href="src/css/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="sheet-header">
        <input type="text" id="char-name" placeholder="Nome do Personagem" />
        <div class="header-stats">
          <div class="stat-box">
            <label>Classe & Nível</label>
            <input type="text" id="char-class" placeholder="Ex: Guerreiro 3" />
          </div>
          <div class="stat-box">
            <label>CA</label>
            <input type="number" id="char-ac" value="10" />
          </div>
          <div class="stat-box">
            <label>HP Atual</label>
            <input type="number" id="char-hp-atual" value="10" />
          </div>
          <div class="stat-box">
            <label>HP Máx</label>
            <input type="number" id="char-hp-max" value="10" />
          </div>
        </div>
      </header>

      <main class="sheet-body">
        <h3>Atributos</h3>
        <div class="attributes-grid" id="attributes-grid"></div>
      </main>

      <footer class="sheet-footer">
        <button id="save-btn">Salvar Ficha</button>
        <span id="status-msg"></span>
      </footer>
    </div>
    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
